name: Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode release keystore when configured
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Release keystore configured."
          else
            echo "No release keystore secret; building a debug-signed APK (sideload testing only)."
          fi

      - name: Build release APK
        working-directory: android
        env:
          # Repository variable pointing at the live HTTPS web app. Update it
          # (and re-run this workflow) after a custom-domain migration.
          WEB_APP_URL: ${{ vars.WEB_APP_URL }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Collect APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk Sahaana-Bhakshanam.apk
          ls -la Sahaana-Bhakshanam.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Sahaana-Bhakshanam-apk
          path: Sahaana-Bhakshanam.apk
          if-no-files-found: error

      - name: Publish APK in a GitHub Release
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="android-v${{ github.run_number }}"
          gh release create "$TAG" Sahaana-Bhakshanam.apk \
            --latest \
            --title "Sahaana Bhakshanam Android $TAG" \
            --notes "Android WebView app pointing at \${WEB_APP_URL:-the default workers.dev host}. Download Sahaana-Bhakshanam.apk below and sideload it. Debug-signed unless the release keystore secrets are configured."
